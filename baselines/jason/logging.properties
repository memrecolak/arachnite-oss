# Headless-safe logging config for Jason benchmarks.
# RunLocalMAS.init() picks this up from the working directory before
# falling back to the MASConsoleLogHandler template inside jason.jar.
handlers=java.util.logging.ConsoleHandler
.level=WARNING
java.util.logging.ConsoleHandler.level=WARNING
java.util.logging.ConsoleHandler.formatter=java.util.logging.SimpleFormatter
java.level=OFF
javax.level=OFF
sun.level=OFF
jade.level=OFF
